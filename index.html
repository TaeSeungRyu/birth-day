<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프리미엄 멤버 명단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        font-size: 1rem;
      }
      table {
        border-collapse: separate;
        border-spacing: 0;
      }
      .sort-header {
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .sort-header:hover {
        background-color: rgba(241, 245, 249, 0.1);
      }
      .region-cell {
        background-color: rgb(248, 250, 252);
        font-weight: 600;
        color: #1e293b;
        border-right: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body class="bg-slate-100 p-4 md:p-12 font-sans">
    <div class="max-w-5xl mx-auto">
      <div class="mb-6">
        <h1
          class="text-3xl font-extrabold text-slate-800 tracking-tight text-center"
        >
          용당 프리미엄 멤버
        </h1>
      </div>

      <div
        class="bg-white rounded-2xl shadow-xl border border-slate-300 overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table id="user-table" class="w-full text-center">
            <thead>
              <tr
                class="bg-slate-800 text-white text-sm uppercase tracking-wider"
              >
                <th class="px-6 py-4 font-bold">지역</th>
                <th class="px-6 py-4 font-bold">이름</th>
                <th class="px-6 py-4 font-bold sort-header" data-sort="lunar">
                  음력 <i class="fa-solid fa-sort ml-1 opacity-50"></i>
                </th>
                <th class="px-6 py-4 font-bold sort-header" data-sort="solar">
                  양력 <i class="fa-solid fa-sort ml-1 opacity-50"></i>
                </th>
              </tr>
            </thead>
            <tbody
              id="user-table-body"
              class="text-slate-600 divide-y divide-slate-300"
            ></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        // 1. 샘플 데이터 (일부 데이터가 비어 있는 경우 포함)
        const data = [
          { region: "서울1", name: "전수복", lunar: "03.02", solar: "" },
          { region: "서울1", name: "문영희", lunar: "01.27", solar: "" },

          { region: "서울2", name: "전훈", lunar: "", solar: "10.17" },
          { region: "서울2", name: "이근선", lunar: "", solar: "01.03" },
          { region: "서울2", name: "전예빈", lunar: "", solar: "10.26" },
          { region: "서울2", name: "전재홍", lunar: "", solar: "10.03" },
          { region: "서울2", name: "전이담", lunar: "", solar: "11.04" },

          { region: "예산", name: "류경모", lunar: "06.20", solar: "" },
          { region: "예산", name: "전선미", lunar: "02.12", solar: "" },

          { region: "인천", name: "류태승", lunar: "", solar: "06.06" },
          { region: "인천", name: "김수진", lunar: "", solar: "07.18" },
          { region: "인천", name: "류연수", lunar: "", solar: "07.23" },
          { region: "인천", name: "류연아", lunar: "", solar: "10.28" },

          { region: "화성1", name: "류문선", lunar: "", solar: "01.04" },
          { region: "화성1", name: "정지선", lunar: "", solar: "01.18" },
          { region: "화성1", name: "류서현", lunar: "", solar: "09.21" },

          { region: "목포", name: "전수용", lunar: "12.21", solar: "" },
          { region: "목포", name: "김미애", lunar: "05.01", solar: "" },

          { region: "화성2", name: "전현주", lunar: "", solar: "02.22" },
          { region: "화성2", name: "김진수", lunar: "", solar: "04.01" },
          { region: "화성2", name: "김도윤", lunar: "", solar: "06.29" },
          { region: "화성2", name: "김이솔", lunar: "", solar: "03.03" },
        ];

        let currentData = [...data];
        let sortDirection = { lunar: 1, solar: 1 };

        // 2. 렌더링 함수 (정렬 후 재호출됨)
        function renderTable(data) {
          const $tbody = $("#user-table-body").empty();
          // 지역순 정렬 (그룹화 유지를 위해 1차 정렬은 항상 지역)
          // 단, 클릭한 정렬이 있다면 그 정렬 내에서 지역을 묶어 보여줍니다.
          let lastRegion = "";
          let $lastRegionCell = null;
          let rowCount = 1;
          $.each(data, function (index, item) {
            const $tr = $('<tr class="hover:bg-blue-50/50 transition-colors">');

            // 지역 병합 처리
            if (item.region !== lastRegion) {
              $lastRegionCell = $('<td class="px-6 py-4 region-cell">')
                .text(item.region)
                .attr("rowspan", 1);
              $tr.append($lastRegionCell);
              lastRegion = item.region;
              rowCount = 1;
            } else {
              rowCount++;
              $lastRegionCell.attr("rowspan", rowCount);
            }
            // 데이터 출력 (없으면 '-' 표시)
            $tr.append(
              $('<td class="px-6 py-4 font-medium text-slate-900">').text(
                item.name,
              ),
            );
            $tr.append($('<td class="px-6 py-4">').text(item.lunar || "-"));
            $tr.append($('<td class="px-6 py-4">').text(item.solar || "-"));
            $tbody.append($tr);
          });
        }
        // 3. 정렬 이벤트 처리
        $(".sort-header").on("click", function () {
          const sortKey = $(this).data("sort");
          const direction = sortDirection[sortKey];
          currentData.sort((a, b) => {
            // 데이터가 없는 경우 뒤로 보냄
            const valA = a[sortKey] || "99.99";
            const valB = b[sortKey] || "99.99";

            if (valA < valB) return -1 * direction;
            if (valA > valB) return 1 * direction;
            return 0;
          });
          // 방향 전환
          sortDirection[sortKey] *= -1;
          // 아이콘 변경
          $(this)
            .find("i")
            .attr(
              "class",
              direction === 1
                ? "fa-solid fa-sort-up ml-1"
                : "fa-solid fa-sort-down ml-1",
            );

          renderTable(currentData);
        });
        // 초기 렌더링
        renderTable(currentData);
      });
    </script>
  </body>
</html>
