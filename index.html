<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>용당 프리미엄 멤버</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* 모바일 줄바꿈 방지 및 테이블 최적화 */
      .nowrap {
        white-space: nowrap;
      }
      table {
        border-collapse: separate;
        border-spacing: 0;
      }

      /* 헤더 정렬 버튼 효과 */
      .sort-header {
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .sort-header:hover {
        background-color: #2563eb;
      } /* 조금 더 짙은 파랑 */

      /* 지역 셀 전용 스타일 */
      .region-cell {
        background-color: #f0f9ff;
        font-weight: 700;
        color: #0369a1;
        border-right: 1px solid #e0f2fe;
      }
    </style>
  </head>
  <body class="bg-blue-50 p-4 md:p-12 font-sans text-slate-600">
    <div class="max-w-5xl mx-auto">
      <div class="mb-10 text-center">
        <h1
          class="text-3xl font-extrabold text-blue-900 tracking-tight flex justify-center items-center gap-3"
        >
          <i class="fa-solid fa-crown text-amber-400"></i>
          용당 프리미엄 멤버
        </h1>
        <p class="text-blue-600/70 mt-2 font-medium">Premium Membership List</p>
      </div>

      <div
        class="bg-white shadow-2xl shadow-blue-200/60 border border-blue-100 overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table id="user-table" class="w-full text-center">
            <thead>
              <tr
                class="bg-blue-500 text-white text-sm uppercase tracking-widest"
              >
                <th class="px-3 py-2 font-bold nowrap">지역</th>
                <th class="px-3 py-2 font-bold nowrap">이름</th>
                <th
                  class="px-3 py-2 font-bold sort-header nowrap"
                  data-sort="lunar"
                >
                  음력 <i class="fa-solid fa-sort ml-1 opacity-60"></i>
                </th>
                <th
                  class="px-3 py-2font-bold sort-header nowrap"
                  data-sort="solar"
                >
                  양력 <i class="fa-solid fa-sort ml-1 opacity-60"></i>
                </th>
              </tr>
            </thead>
            <tbody
              id="user-table-body"
              class="text-slate-600 divide-y divide-blue-300"
            >
              <tr>
                <td colspan="4" class="py-20 text-blue-300 font-medium">
                  <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> 데이터를
                  불러오는 중입니다...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        let currentData = [
          { region: "서울1", name: "전수복", lunar: "03.02", solar: "" },
          { region: "서울1", name: "문영희", lunar: "01.27", solar: "" },
          { region: "서울2", name: "전훈", lunar: "", solar: "10.17" },
          { region: "서울2", name: "이근선", lunar: "", solar: "01.03" },
          { region: "서울2", name: "전예빈", lunar: "", solar: "10.26" },
          { region: "서울2", name: "전재홍", lunar: "", solar: "10.03" },
          { region: "서울2", name: "전이담", lunar: "", solar: "11.04" },
          { region: "예산", name: "류경모", lunar: "06.22", solar: "" },
          { region: "예산", name: "전선미", lunar: "02.12", solar: "" },
          { region: "인천", name: "류태승", lunar: "", solar: "06.06" },
          { region: "인천", name: "김수진", lunar: "", solar: "07.18" },
          { region: "인천", name: "류연수", lunar: "", solar: "07.23" },
          { region: "인천", name: "류연아", lunar: "", solar: "10.28" },
          { region: "화성1", name: "류문선", lunar: "", solar: "01.04" },
          { region: "화성1", name: "정지선", lunar: "", solar: "01.18" },
          { region: "화성1", name: "류서현", lunar: "", solar: "09.21" },
          { region: "목포", name: "전수용", lunar: "12.21", solar: "" },
          { region: "목포", name: "김미애", lunar: "05.01", solar: "" },
          { region: "화성2", name: "전현주", lunar: "", solar: "02.22" },
          { region: "화성2", name: "김진수", lunar: "", solar: "04.01" },
          { region: "화성2", name: "김도윤", lunar: "", solar: "06.29" },
          { region: "화성2", name: "김이솔", lunar: "", solar: "03.03" },
        ];
        let sortDirection = { lunar: 1, solar: 1 };

        /**
         * 1. 데이터 로드 함수
         * 외부에서 호출하거나, 특정 이벤트를 통해 base64 문자열을 전달받아 실행할 수 있습니다.
         */
        window.loadPremiumData = function () {
          try {
            // 한글 유니코드 대응 디코딩
            renderTable(currentData);
          } catch (e) {
            console.error("데이터 파싱 오류:", e);
            $("#user-table-body").html(
              '<tr><td colspan="4" class="py-20 text-red-400">데이터 형식이 올바르지 않습니다.</td></tr>',
            );
          }
        };

        /**
         * 2. 렌더링 함수
         */
        function renderTable(dataList) {
          const $tbody = $("#user-table-body").empty();
          let lastRegion = "";
          let $lastRegionCell = null;
          let rowCount = 1;

          if (dataList.length === 0) {
            $tbody.html(
              '<tr><td colspan="4" class="py-20 text-slate-400">표시할 데이터가 없습니다.</td></tr>',
            );
            return;
          }

          $.each(dataList, function (index, item) {
            const $tr = $('<tr class="hover:bg-blue-50/80 transition-colors">');

            // 지역 셀 병합 로직
            if (item.region !== lastRegion) {
              $lastRegionCell = $('<td class="px-3 py-2 region-cell nowrap">')
                .text(item.region)
                .attr("rowspan", 1);
              $tr.append($lastRegionCell);
              lastRegion = item.region;
              rowCount = 1;
            } else {
              rowCount++;
              $lastRegionCell.attr("rowspan", rowCount);
            }

            // 이름, 음력, 양력 셀 추가 (줄바꿈 방지 클래스 적용)
            const nameCell = $(
              '<td class="px-3 py-2 font-bold text-slate-600 nowrap">',
            ).text(item.name);
            const lunarCell = $(
              '<td class="px-3 py-2 text-slate-600 nowrap">',
            ).text(item.lunar || "-");
            const solarCell = $(
              '<td class="px-3 py-2 text-slate-600 nowrap">',
            ).text(item.solar || "-");

            $tr.append(nameCell).append(lunarCell).append(solarCell);
            $tbody.append($tr);
          });
        }

        /**
         * 3. 정렬 이벤트
         */
        $(".sort-header").on("click", function () {
          const sortKey = $(this).data("sort");
          const direction = sortDirection[sortKey];

          currentData.sort((a, b) => {
            // 빈 데이터는 항상 아래로
            const valA = a[sortKey] || (direction === 1 ? "99.99" : "00.00");
            const valB = b[sortKey] || (direction === 1 ? "99.99" : "00.00");
            return valA.localeCompare(valB) * direction;
          });

          sortDirection[sortKey] *= -1; // 방향 반전

          // 아이콘 상태 변경
          $(".sort-header i").attr("class", "fa-solid fa-sort ml-1 opacity-30");
          const iconClass =
            direction === 1
              ? "fa-solid fa-sort-down ml-1"
              : "fa-solid fa-sort-up ml-1";
          $(this).find("i").attr("class", iconClass).removeClass("opacity-30");

          renderTable(currentData);
        });

        window.loadPremiumData();
      });
    </script>
  </body>
</html>
